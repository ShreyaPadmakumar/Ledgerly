<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<header th:fragment="navbar"
        class="sticky top-0 z-20 flex items-center justify-between h-16 px-4 sm:px-6 lg:px-8 bg-white/80 dark:bg-surface-800/80 backdrop-blur-xl border-b border-gray-200/60 dark:border-gray-700/40">

    <!-- Left: Mobile Menu Toggle + Page Title -->
    <div class="flex items-center gap-4">
        <!-- Mobile Hamburger -->
        <button @click="mobileMenuOpen = !mobileMenuOpen"
                class="lg:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>

        <!-- Page Title -->
        <div>
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white" th:text="${pageTitle} ?: 'Dashboard'">Dashboard</h2>
            <p class="text-xs text-gray-500 dark:text-gray-400">
                <span th:text="${#temporals.format(#temporals.createNow(), 'EEEE, dd MMMM yyyy')}">Monday, 18 May 2026</span>
            </p>
        </div>
    </div>

    <!-- Right: Actions -->
    <div class="flex items-center gap-2">
        <!-- Search (Desktop) -->
        <div class="hidden md:flex items-center gap-2 px-3 py-2 rounded-xl bg-gray-100 dark:bg-gray-700/50 border border-transparent focus-within:border-brand-500/50 focus-within:bg-white dark:focus-within:bg-surface-800 transition-all duration-200 w-64">
            <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
            <input type="text" placeholder="Search expenses..."
                   class="flex-1 bg-transparent text-sm text-gray-700 dark:text-gray-300 placeholder-gray-400 outline-none">
        </div>

        <!-- Dark Mode Toggle -->
        <button x-data="{ dark: document.documentElement.classList.contains('dark') }"
                @click="dark = !dark; document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', dark ? 'dark' : 'light')"
                class="p-2.5 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all duration-200"
                id="theme-toggle">
            <i data-lucide="moon" class="w-5 h-5" x-show="!dark"></i>
            <i data-lucide="sun" class="w-5 h-5" x-show="dark" x-cloak></i>
        </button>

        <!-- Notifications -->
        <button class="relative p-2.5 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all duration-200">
            <i data-lucide="bell" class="w-5 h-5"></i>
            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-brand-500 rounded-full ring-2 ring-white dark:ring-surface-800"></span>
        </button>

        <!-- Profile -->
        <div x-data="{ open: false }" class="relative">
            <button @click="open = !open" class="flex items-center gap-2 p-1.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all duration-200">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-400 to-purple-500 flex items-center justify-center shadow-md">
                    <span class="text-xs font-bold text-white">S</span>
                </div>
                <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 hidden sm:block transition-transform duration-200" :class="open && 'rotate-180'"></i>
            </button>

            <!-- Dropdown -->
            <div x-show="open" @click.away="open = false"
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 scale-95 -translate-y-2"
                 x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-150"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-95"
                 class="absolute right-0 mt-2 w-56 rounded-xl bg-white dark:bg-surface-800 border border-gray-200 dark:border-gray-700/60 shadow-xl shadow-gray-200/50 dark:shadow-black/30 py-2 z-50">
                <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-700/40">
                    <p class="text-sm font-semibold text-gray-900 dark:text-white">Shreya</p>
                    <p class="text-xs text-gray-500 dark:text-gray-400">shreya@ledgerly.com</p>
                </div>
                <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/40 transition-colors">
                    <i data-lucide="settings" class="w-4 h-4"></i> Settings
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Sign out
                </a>
            </div>
        </div>
    </div>
</header>

</body>
</html>
