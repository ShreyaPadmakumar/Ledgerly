<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ledgerly — Premium Personal Finance Dashboard">

    <title layout:title-pattern="$CONTENT_TITLE — Ledgerly">Ledgerly</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#EEF2FF',
                            100: '#E0E7FF',
                            200: '#C7D2FE',
                            300: '#A5B4FC',
                            400: '#818CF8',
                            500: '#6366F1',
                            600: '#4F46E5',
                            700: '#4338CA',
                            800: '#3730A3',
                            900: '#312E81',
                        },
                        surface: {
                            50: '#F8FAFC',
                            100: '#F1F5F9',
                            200: '#E2E8F0',
                            700: '#1E293B',
                            800: '#111827',
                            850: '#0F172A',
                            900: '#0B1120',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/animations.css}">
    <link rel="stylesheet" th:href="@{/css/themes.css}">
</head>

<body class="font-sans bg-surface-50 dark:bg-surface-900 text-gray-900 dark:text-gray-100 antialiased transition-colors duration-300"
      x-data="{ sidebarOpen: true, mobileMenuOpen: false }"
      x-init="
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
        if (window.innerWidth < 1024) {
            sidebarOpen = false;
        }
      ">

    <div class="flex h-screen overflow-hidden">

        <!-- Sidebar -->
        <div th:replace="~{fragments/layout/sidebar :: sidebar}"></div>

        <!-- Main Content Area -->
        <div class="flex flex-col flex-1 overflow-hidden"
             :class="sidebarOpen ? 'lg:ml-64' : 'lg:ml-20'"
             style="transition: margin-left 0.3s ease;">

            <!-- Navbar -->
            <div th:replace="~{fragments/layout/navbar :: navbar}"></div>

            <!-- Page Content -->
            <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
                <div layout:fragment="content"></div>
            </main>

            <!-- Footer -->
            <div th:replace="~{fragments/layout/footer :: footer}"></div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div x-data="toastManager()" x-init="init()" id="toast-container"
         class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="toast.visible"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4 scale-95"
                 x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0 scale-100"
                 x-transition:leave-end="opacity-0 translate-y-4 scale-95"
                 class="flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl backdrop-blur-xl border min-w-[320px]"
                 :class="{
                    'bg-emerald-500/10 border-emerald-500/20 text-emerald-400': toast.type === 'success',
                    'bg-red-500/10 border-red-500/20 text-red-400': toast.type === 'error',
                    'bg-blue-500/10 border-blue-500/20 text-blue-400': toast.type === 'info'
                 }">
                <i :data-lucide="toast.type === 'success' ? 'check-circle-2' : toast.type === 'error' ? 'alert-circle' : 'info'"
                   class="w-5 h-5 shrink-0"></i>
                <span x-text="toast.message" class="text-sm font-medium flex-1"></span>
                <button @click="removeToast(toast.id)" class="hover:opacity-70 transition-opacity">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </template>
    </div>

    <!-- Mobile Overlay -->
    <div x-show="mobileMenuOpen"
         x-transition:enter="transition-opacity ease-linear duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-linear duration-300"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="mobileMenuOpen = false"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 lg:hidden">
    </div>

    <!-- Custom Scripts -->
    <script th:href="@{/js/theme.js}" th:src="@{/js/theme.js}"></script>
    <script layout:fragment="scripts"></script>

    <!-- Initialize Lucide Icons -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>

    <!-- Toast Manager -->
    <script th:inline="javascript">
        function toastManager() {
            return {
                toasts: [],
                init() {
                    const type = /*[[${toastType}]]*/ null;
                    const message = /*[[${toastMessage}]]*/ null;
                    if (type && message) {
                        this.addToast(type, message);
                    }
                    // Re-initialize lucide after Alpine renders
                    this.$nextTick(() => lucide.createIcons());
                },
                addToast(type, message) {
                    const id = Date.now();
                    this.toasts.push({ id, type, message, visible: true });
                    setTimeout(() => this.removeToast(id), 4000);
                },
                removeToast(id) {
                    const toast = this.toasts.find(t => t.id === id);
                    if (toast) toast.visible = false;
                    setTimeout(() => {
                        this.toasts = this.toasts.filter(t => t.id !== id);
                    }, 300);
                }
            };
        }
    </script>
</body>
</html>
